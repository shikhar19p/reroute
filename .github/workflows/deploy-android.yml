name: Build & Submit Android to Play Store

on:
  push:
    branches: [master, main]

jobs:
  build-and-submit:
    name: EAS Build + Submit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Google Play service account key
        run: |
          echo "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" | base64 --decode > google-play-key.json

      - name: Build Android (AAB)
        run: eas build --platform android --profile production --non-interactive
        env:
          ENVIRONMENT: production

      - name: Submit to Play Store (internal track)
        run: eas submit --platform android --latest --non-interactive

      - name: Clean up key file
        if: always()
        run: rm -f google-play-key.json

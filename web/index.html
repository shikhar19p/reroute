<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="ReRoute Adventures — Discover and book unique farmhouses and resorts for weekend getaways, day use, and overnight stays across India." />
    <meta name="theme-color" content="#C5A565" />
    <meta name="robots" content="index, follow" />
    <title>ReRoute Adventures</title>

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://firebasestorage.googleapis.com" />

    <!-- Preload background image so it renders instantly on login screen -->
    <link rel="preload" href="/assets/farmhouse-bg.jpg" as="image" />

    <!-- Inter font via CDN with font-display:swap — eliminates JS font blocking (saves ~3000ms) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Critical CSS -->
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      body {
        overflow: hidden;
        background-color: #F9F8EF;
      }

      #root {
        display: flex;
        height: 100%;
        width: 100%;
      }

      /* Remove all focus outlines and box-shadows globally (covers RN Web TextInput) */
      *, *:focus, *:focus-visible, *:focus-within {
        outline: none !important;
        box-shadow: none !important;
        -webkit-tap-highlight-color: transparent;
      }
      input, textarea, select, [contenteditable] {
        outline: none !important;
        box-shadow: none !important;
      }
      input:focus, textarea:focus, select:focus {
        outline: none !important;
        box-shadow: none !important;
      }

      /* Prevent invisible text during font load */
      @font-face {
        font-family: 'Inter';
        font-display: swap;
      }

      /* Web splash screen — visible before JS loads and during auth init */
      #web-splash {
        position: fixed;
        inset: 0;
        background-color: #F9F8EF;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.35s ease;
      }
      #web-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #web-splash img {
        width: 96px;
        height: 96px;
        border-radius: 20px;
        object-fit: cover;
      }
      #web-splash-title {
        margin-top: 18px;
        font-family: 'Inter', sans-serif;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 2px;
        color: #C5A565;
        text-transform: uppercase;
      }
    </style>

    <link rel="icon" href="/favicon.ico" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Splash shown immediately before React mounts -->
    <div id="web-splash">
      <img src="/assets/splash-icon.png" alt="ReRoute Adventures" />
      <div id="web-splash-title">ReRoute Adventures</div>
    </div>

    <div id="root"></div>
  </body>
</html>
